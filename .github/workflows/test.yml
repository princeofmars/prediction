name: Backend Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install locked dependencies
        run: |
          cd backend
          uv sync --locked
      - name: Verify migrations and run tests
        env:
          ADMIN_KEY: ci-test-admin-key
        run: |
          cd backend
          uv run alembic upgrade head
          uv run pytest -q
